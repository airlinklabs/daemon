<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <img class="brand-logo" src="__LOGO__" alt="Airlink">
      <div>
        <div class="brand-title">Airlink</div>
        <div class="brand-sub">daemon</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="console">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,17 10,11 4,5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        Console
      </button>
      <button class="nav-item" data-tab="files">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"></path></svg>
        Files
      </button>
      <button class="nav-item" data-tab="containers">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12H2"></path><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path><line x1="6" y1="16" x2="6.01" y2="16"></line><line x1="10" y1="16" x2="10.01" y2="16"></line></svg>
        Docker
      </button>
      <button class="nav-item" data-tab="settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        Settings
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="status-row">
        <span id="status-dot" class="status-dot running"></span>
        <span id="status-label" class="status-label">Running</span>
      </div>
      <button id="theme-toggle" class="btn-ghost" title="Switch light / dark theme">B/W</button>
      <button id="btn-stop" class="btn-stop-daemon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg>
        Stop daemon
      </button>
    </div>
  </aside>

  <main class="main">
    <div id="page-content" class="flex-1 min-w-0 overflow-y-auto">
      <header class="page-header px-8 pt-4">
        <div>
          <h1 id="page-title">Console</h1>
          <p id="page-subtitle">Live daemon output and host resource usage.</p>
        </div>
        <div class="header-right">
          <div id="header-badge" class="header-badge running">
            <span class="status-dot running"></span>
            <span id="badge-label">Running</span>
          </div>
        </div>
      </header>

      <div id="main-content">
        __TABS__
      </div>
    </div>
  </main>
</div>

<div id="modal-overlay">
  <div class="modal-panel" id="modal-panel">
    <div class="modal-body">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div id="modal-extra"></div>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" id="modal-cancel">Cancel</button>
      <button class="modal-confirm danger" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="__SCRIPTS__"></script>
</body>
</html>
