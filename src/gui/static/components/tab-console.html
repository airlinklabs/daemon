<section id="tab-console" class="tab-page active">
  <div class="console-split">
    <div class="console-left">
      <div class="card console-card">
        <div class="section-head">
          <div class="console-toolbar">
            <span>Output</span>
            <div class="toolbar-right">
              <label class="check-row" id="autoscroll-label">
                <input type="checkbox" id="autoscroll-toggle" checked>
                <span class="check-box">
                  <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"></polyline></svg>
                </span>
                Auto-scroll
              </label>
              <button class="btn-ghost" id="clear-btn" style="font-size:11px;padding:4px 9px;">Clear</button>
            </div>
          </div>
        </div>
        <!-- Console chrome bar -->
        <div class="flex items-center gap-2 px-3 py-2 bg-[#1c1c1c] border-b border-neutral-800 shrink-0">
          <span class="text-[11px] font-medium text-neutral-600 select-none tracking-wide">console</span>
        </div>
        <div class="bg-[#141414] flex-1 relative">
          <div id="console-output" class="console-output"></div>
        </div>
        <div class="relative">
          <div class="relative">
            <input id="cmd-input" type="text" autocomplete="off" placeholder="Send command to daemon…"
              class="w-full px-4 py-3 bg-neutral-200 dark:bg-neutral-600/20 text-neutral-800 dark:text-white rounded-b-xl text-sm border-t border-neutral-600/20 focus:ring-1 focus:ring-neutral-500/50 dark:focus:ring-neutral-100/20 focus:border-transparent placeholder:font-medium placeholder:text-neutral-600 dark:placeholder:text-neutral-500"
              style="background: transparent; position: relative; z-index: 1;">
            <div id="ghost-text-bg" class="absolute inset-0 px-4 py-3 text-sm pointer-events-none rounded-b-xl overflow-hidden bg-neutral-200 dark:bg-neutral-600/20 border-t border-neutral-600/20" style="z-index: 0;">
              <span id="ghost-typed" class="invisible"></span><span id="ghost-suggestion" class="text-neutral-400 dark:text-neutral-500"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="console-right" id="resource-panel">
      <div class="card">
        <div class="section-head">CPU</div>
        <div class="section-body">
          <div class="metric-value" id="cpu-value">0%</div>
          <div class="progress"><div class="progress-bar" id="cpu-bar" style="width:0%"></div></div>
          <div class="metric-sub" id="cpu-meta">— cores</div>
        </div>
      </div>
      <div class="card">
        <div class="section-head">Memory</div>
        <div class="section-body">
          <div class="metric-value" id="mem-value">0 / 0 MB</div>
          <div class="progress"><div class="progress-bar green" id="mem-bar" style="width:0%"></div></div>
          <div class="metric-sub" id="mem-meta">host memory</div>
        </div>
      </div>
      <div class="card">
        <div class="section-head">Session</div>
        <div class="section-body">
          <div class="metric-value" id="uptime-value">00:00:00</div>
          <div class="progress"><div class="progress-bar" id="uptime-bar" style="width:100%;background:var(--accent)"></div></div>
          <div class="metric-sub">gui uptime</div>
        </div>
      </div>
    </div>
  </div>
</section>
