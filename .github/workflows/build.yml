name: build
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v3.0.0-beta.rc1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: true
        type: boolean
        default: true
      draft:
        description: 'Mark as draft'
        required: true
        type: boolean
        default: false

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            runner: ubuntu-latest
            platform: linux
            arch: x64
          - target: bun-linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - target: bun-darwin-x64
            runner: macos-13
            platform: macos
            arch: x64
          - target: bun-darwin-arm64
            runner: macos-latest
            platform: macos
            arch: arm64
          - target: bun-windows-x64
            runner: ubuntu-latest
            platform: windows
            arch: x64
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install deps
        run: bun install --frozen-lockfile

      - name: build binary
        run: |
          mkdir -p dist
          bun build --compile --target ${{ matrix.target }} --outfile dist/airlinkd src/app.ts src/server.ts

      - name: zip binary
        run: |
          cd dist
          zip airlinkd-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.event.inputs.version }}.zip airlinkd

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: airlinkd-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.event.inputs.version }}
          path: dist/airlinkd-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.event.inputs.version }}.zip
          if-no-files-found: error

  release:
    name: create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: list artifacts
        run: ls -lh dist/

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: dist/*
          generate_release_notes: true
          draft: ${{ github.event.inputs.draft }}
          prerelease: ${{ github.event.inputs.prerelease }}
